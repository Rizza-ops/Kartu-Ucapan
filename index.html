<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Message</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#111827,#1f2937,#374151);
color:white;
padding:20px;
}

/* STARS */

.stars{
position:absolute;
width:100%;
height:100%;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
0%{opacity:.2; transform:scale(1)}
50%{opacity:1; transform:scale(1.6)}
100%{opacity:.2; transform:scale(1)}
}

/* SHOOTING STAR */

.shooting-star{
position:absolute;
width:2px;
height:80px;
background:linear-gradient(-45deg,white,transparent);
opacity:0;
transform:rotate(45deg);
animation:shoot 8s linear infinite;
}

.shooting-star:nth-child(1){
top:10%;
left:20%;
animation-delay:0s;
}

.shooting-star:nth-child(2){
top:40%;
left:80%;
animation-delay:3s;
}

.shooting-star:nth-child(3){
top:70%;
left:50%;
animation-delay:6s;
}

@keyframes shoot{

0%{
opacity:0;
transform:translateX(0) translateY(0) rotate(45deg);
}

10%{opacity:1;}

100%{
opacity:0;
transform:translateX(-600px) translateY(600px) rotate(45deg);
}

}

/* CARD */

.card{

position:relative;
width:100%;
max-width:430px;
padding:40px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);

border-radius:20px;

box-shadow:
0 0 20px rgba(255,255,255,0.05),
0 0 60px rgba(255,255,255,0.03),
0 20px 60px rgba(0,0,0,0.4);

text-align:center;

animation:cardEnter 1.2s ease;

}

/* GLOW */

.card::before{
content:"";
position:absolute;
inset:-2px;
border-radius:22px;
background:linear-gradient(45deg,transparent,rgba(255,255,255,0.15),transparent);
opacity:.6;
filter:blur(20px);
z-index:-1;
}

@keyframes cardEnter{
from{
opacity:0;
transform:translateY(40px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

h2{
font-weight:400;
margin-bottom:15px;
font-size:22px;
}

/* INPUT */

input{
width:100%;
padding:13px;
border-radius:10px;
border:none;
margin-top:10px;
outline:none;
font-size:16px;
}

/* BUTTON */

button{
margin-top:15px;
padding:13px;
width:100%;
border:none;
border-radius:10px;
background:white;
color:#333;
cursor:pointer;
transition:.3s;
font-size:16px;
}

button:hover{
transform:scale(1.05);
}

/* SHAKE */

.shake{
animation:shake .4s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

/* MESSAGE */

#messagePage{
display:none;
}

/* TEXT */

.text{
margin-top:15px;
line-height:1.8;
font-size:15px;
text-align:left;
max-height:260px;
overflow-y:auto;
padding-right:6px;
}

.text p{
margin-bottom:16px;
}

/* MOBILE */

@media (max-width:480px){

.card{
padding:28px;
}

h2{
font-size:20px;
}

.text{
max-height:320px;
font-size:14px;
}

}

</style>
</head>

<body>

<div class="stars">

<div class="star" style="top:10%;left:20%"></div>
<div class="star" style="top:40%;left:70%"></div>
<div class="star" style="top:80%;left:10%"></div>
<div class="star" style="top:30%;left:50%"></div>
<div class="star" style="top:60%;left:80%"></div>
<div class="star" style="top:15%;left:85%"></div>
<div class="star" style="top:75%;left:60%"></div>
<div class="star" style="top:50%;left:25%"></div>
<div class="star" style="top:65%;left:40%"></div>

</div>

<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<!-- LOGIN -->

<div class="card" id="loginPage">

<h2>🔐 Passwordnya Kaka</h2>

<input type="password" id="password" placeholder="ketik password disini">

<button onclick="checkPassword()">Buka Pesan</button>

<p id="error" style="color:#ffb4b4;margin-top:10px;"></p>

</div>


<!-- MESSAGE -->

<div class="card" id="messagePage">

<h2>Happy Eid Mubarak Devita</h2>

<div class="text" id="typingText"></div>

</div>

<script>

const message = [

`Maaf yeah karna telat memberi special gift 4u jadi bingung ini kado ultah apa thr. pertama tama ucapan terimakasih lagi karna aku pikir masa kita memang udah habis dan kita asing gitu aja ahahaha ternyata aku dikejutkan ketika bukber deh, jujur itu aslinya salting banget cuman sok cool aja.`,

`Aku ucapin terimakasih ya udah jd seseorang yg baik dan pengertian ke semua orang meski ga semua orang membalasmu dengan setara ditambah lagi positif vibesmu masih berasa sampe sekarang anjay, Bahkan aku ngepeppun kamu mempertanyakan loh ahahaha, sebenernya mah buat nenangin pikiran doang ditambah lagi aku ga ada tempat untuk mengutarakan semua bebanku jd aku beralih ke panggunaan nikotin tp ga yg kecanduan kok tenang ajh.`,

`ada sedikit pengakuan dosa sih, aku minta maaf banget sebanget bangetnya ya klo keliatan ngehindar bukan karena apa tp karna u jg udh punya cwo ye kan dan aku gamau keterusan karna sekarang aku percaya klo cwe sama cwo gabisa jd temen deket.`,

`Semoga suka sama kadonyaaaa meski cuman sedikit tp aku ngeliat u pake ini bakal cakep deh apalagi buat main.`

]

function checkPassword(){

const correctPassword="16012005"
const input=document.getElementById("password").value
const loginCard=document.getElementById("loginPage")

if(input===correctPassword){

loginCard.style.opacity="0"

setTimeout(()=>{

loginCard.style.display="none"
document.getElementById("messagePage").style.display="block"

typeText()

},500)

}else{

document.getElementById("error").innerText="Password salah"
loginCard.classList.add("shake")

setTimeout(()=>{
loginCard.classList.remove("shake")
},400)

}

}

function typeText(){

const target=document.getElementById("typingText")

let pIndex=0
let charIndex=0

function type(){

if(pIndex < message.length){

if(!target.children[pIndex]){

const p=document.createElement("p")
target.appendChild(p)

}

let currentP=target.children[pIndex]

if(charIndex < message[pIndex].length){

currentP.innerHTML += message[pIndex].charAt(charIndex)
charIndex++

setTimeout(type,20)

}else{

pIndex++
charIndex=0

setTimeout(type,400)

}

}

}

type()

}

</script>

</body>
</html>
